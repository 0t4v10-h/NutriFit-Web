<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastrar Usuário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 p-0">
            <div th:replace="fragments/sidebar-admin :: sidebar"></div>
        </div>

        <div class="col-md-10 main-content">

            <div class="card card-custom shadow">

                <div class="card-body">

                    <h2 class="page-title mb-4">
                        👤 Cadastrar Usuário
                    </h2>

                    <form th:action="@{/usuarios/salvar}"
                          th:object="${usuario}"
                          method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Nome</label>

                            <input type="text"
                                   class="form-control"
                                   required
                                   th:field="*{nome}">

                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('nome')}"
                                 th:errors="*{nome}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>

                            <input type="email"
                                   class="form-control"
                                   required
                                   th:field="*{email}">

                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Senha</label>

                            <input type="password"
                                   class="form-control"
                                   required
                                   th:field="*{senha}">

                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('senha')}"
                                 th:errors="*{senha}">
                            </div>
                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Peso (kg)
                                </label>

                                <input type="number"
                                       step="0.1"
                                       min="1"
                                       class="form-control"
                                       required
                                       th:field="*{peso}">

                                <div class="text-danger mt-1"
                                     th:if="${#fields.hasErrors('peso')}"
                                     th:errors="*{peso}">
                                </div>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Altura (cm)
                                </label>

                                <input type="number"
                                       step="0.01"
                                       min="0.50"
                                       max="2.50"
                                       class="form-control"
                                       required
                                       th:field="*{altura}">

                                <div class="text-danger mt-1"
                                     th:if="${#fields.hasErrors('altura')}"
                                     th:errors="*{altura}">
                                </div>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Meta Calórica
                                </label>

                                <input type="number"
                                       step="1"
                                       min="1"
                                       class="form-control"
                                       required
                                       th:field="*{metaCalorica}">

                                <div class="text-danger mt-1"
                                     th:if="${#fields.hasErrors('metaCalorica')}"
                                     th:errors="*{metaCalorica}">
                                </div>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Perfil
                            </label>

                            <select class="form-select"
                                    required
                                    th:field="*{perfil}">

                                <option value="">
                                    Selecione...
                                </option>

                                <option value="ADMIN">
                                    Administrador
                                </option>

                                <option value="USUARIO">
                                    Usuário
                                </option>

                            </select>

                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('perfil')}"
                                 th:errors="*{perfil}">
                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Objetivo Nutricional
                            </label>

                            <select class="form-select"
                                    required
                                    th:field="*{objetivo}">

                                <option value="">
                                    Selecione...
                                </option>

                                <option value="EMAGRECER">
                                    Emagrecer
                                </option>

                                <option value="GANHAR_MASSA">
                                    Ganhar Massa
                                </option>

                                <option value="MANTER_PESO">
                                    Manter Peso
                                </option>

                            </select>

                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('objetivo')}"
                                 th:errors="*{objetivo}">
                            </div>

                        </div>

                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-success">
                                💾 Salvar
                            </button>

                            <a href="/usuarios"
                               class="btn btn-secondary">
                                ↩ Voltar
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
