<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Refeição</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 p-0">
            <div th:replace="fragments/sidebar-admin :: sidebar"></div>
        </div>


        <div class="col-md-10 main-content">

            <div class="card card-custom shadow">

                <div class="card-body">

                    <h2 class="page-title mb-4">
                        🍽️ Cadastrar Refeição
                    </h2>

                    <form th:action="@{/refeicoes/salvar}"
                          th:object="${refeicao}"
                          method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">

                            <label class="form-label">
                                Nome da Refeição
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{nome}">

                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('nome')}"
                                 th:errors="*{nome}">
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Calorias
                                </label>

                                <input type="number"
                                       step="0.1"
                                       class="form-control"
                                       th:field="*{calorias}">

                                <div class="text-danger mt-1"
                                     th:if="${#fields.hasErrors('calorias')}"
                                     th:errors="*{calorias}">
                                </div>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Tipo da Refeição
                                </label>

                                <select class="form-select"
                                        th:field="*{tipo}">

                                    <option value="">
                                        Selecione...
                                    </option>

                                    <option value="CAFE_DA_MANHA">
                                        Café da Manhã
                                    </option>

                                    <option value="ALMOCO">
                                        Almoço
                                    </option>

                                    <option value="JANTAR">
                                        Jantar
                                    </option>

                                    <option value="LANCHE">
                                        Lanche
                                    </option>

                                </select>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Data
                                </label>

                                <input type="date"
                                       class="form-control"
                                       th:field="*{data}">

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label">
                                    Usuário
                                </label>

                                <select class="form-select"
                                        th:field="*{usuario.id}">

                                    <option value="">
                                        Selecione um usuário
                                    </option>

                                    <option th:each="usuario : ${usuarios}"
                                            th:value="${usuario.id}"
                                            th:text="${usuario.nome}">
                                    </option>

                                </select>

                            </div>

                        </div>

                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-success">
                                💾 Salvar
                            </button>

                            <a href="/refeicoes"
                               class="btn btn-secondary">
                                ↩ Voltar
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
