<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Minhas Refeições</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="has-navbar">

    <div th:replace="fragments/header :: header"></div>
    <div th:replace="fragments/sidebar-usuario :: sidebar"></div>

    <div class="main-content">

        <div class="card shadow border-0">

            <div class="card-body">

                <h2 class="fw-bold text-success mb-4">
                    🍽 Minhas Refeições
                </h2>

                <div class="table-responsive">
                    <table class="table table-hover">

                        <thead class="table-success">
                            <tr>
                                <th>Nome</th>
                                <th>Calorias</th>
                                <th>Tipo</th>
                                <th>Data</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr th:each="refeicao : ${refeicoes}">
                                <td th:text="${refeicao.nome}"></td>
                                <td th:text="${refeicao.calorias}"></td>
                                <td th:text="${refeicao.tipo}"></td>
                                <td th:text="${refeicao.data}"></td>
                            </tr>

                        </tbody>

                    </table>
                </div>

            </div>

        </div>

    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
