<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Minha Meta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body class="bg-light">

<div th:replace="fragments/header :: header"></div>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 p-0">
            <div th:replace="fragments/sidebar-usuario :: sidebar"></div>
        </div>

        <div class="col-md-10">

            <div class="container py-4">

                <div class="card shadow border-0">

                    <div class="card-body">

                        <h2 class="fw-bold text-success mb-4">
                            🍽 Minhas Refeições
                        </h2>

                        <table class="table table-hover">

                            <thead class="table-success">
                            <tr>
                                <th>Nome</th>
                                <th>Calorias</th>
                                <th>Tipo</th>
                                <th>Data</th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:each="refeicao : ${refeicoes}">
                                <td th:text="${refeicao.nome}"></td>
                                <td th:text="${refeicao.calorias}"></td>
                                <td th:text="${refeicao.tipo}"></td>
                                <td th:text="${refeicao.data}"></td>
                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
