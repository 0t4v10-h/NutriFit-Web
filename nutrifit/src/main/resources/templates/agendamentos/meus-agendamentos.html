<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Meus Agendamentos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body class="bg-light">

<div th:replace="fragments/header :: header"></div>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 p-0">
            <div th:replace="fragments/sidebar-usuario :: sidebar"></div>
        </div>

        <div class="col-md-10">

            <div class="container py-4">

                <div class="card shadow border-0">

                    <div class="card-body">

                        <h2 class="fw-bold text-success mb-4">
                            📅 Meus Agendamentos
                        </h2>

                        <div th:if="${#lists.isEmpty(agendamentos)}"
                             class="alert alert-warning">

                            Você ainda não possui agendamentos cadastrados.

                        </div>

                        <table th:if="${!#lists.isEmpty(agendamentos)}"
                               class="table table-hover table-bordered align-middle">

                            <thead class="table-success">

                            <tr>
                                <th>Data</th>
                                <th>Horário</th>
                                <th>Status</th>
                            </tr>

                            </thead>

                            <tbody>

                            <tr th:each="agendamento : ${agendamentos}">

                                <td th:text="${agendamento.data}"></td>

                                <td th:text="${agendamento.horario}"></td>

                                <td>

                                    <span class="badge bg-warning"
                                          th:if="${agendamento.status.name() == 'PENDENTE'}">
                                        Pendente
                                    </span>

                                    <span class="badge bg-success"
                                          th:if="${agendamento.status.name() == 'CONFIRMADO'}">
                                        Confirmado
                                    </span>

                                    <span class="badge bg-danger"
                                          th:if="${agendamento.status.name() == 'CANCELADO'}">
                                        Cancelado
                                    </span>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
