<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Agendamento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Cadastrar Agendamento</h2>

    <form th:action="@{/agendamentos/salvar}"
          th:object="${agendamento}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Data</label>

            <input type="date"
                   class="form-control"
                   th:field="*{data}">
        </div>

        <div class="mb-3">
            <label>Horário</label>

            <input type="time"
                   class="form-control"
                   th:field="*{horario}">
        </div>

        <div class="mb-3">

            <label>Status</label>

            <select class="form-select"
                    th:field="*{status}">

                <option value="">
                    Selecione...
                </option>

                <option value="PENDENTE">
                    Pendente
                </option>

                <option value="CONFIRMADO">
                    Confirmado
                </option>

                <option value="CANCELADO">
                    Cancelado
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>Usuário</label>

            <select class="form-select"
                    th:field="*{usuario.id}">

                <option value="">
                    Selecione um usuário
                </option>

                <option th:each="usuario : ${usuarios}"
                        th:value="${usuario.id}"
                        th:text="${usuario.nome}">
                </option>

            </select>

            <div class="text-danger"
                 th:if="${erroUsuario}"
                 th:text="${erroUsuario}">
            </div>

        </div>

        <button type="submit"
                class="btn btn-success">
            Salvar
        </button>

        <a href="/agendamentos"
           class="btn btn-secondary">
            Voltar
        </a>

    </form>

</div>

</body>
</html>
