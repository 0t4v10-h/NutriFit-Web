<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Agendamentos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="has-navbar">

    <div th:replace="fragments/header :: header"></div>

    <div class="container-fluid">

        <div class="row">

            <div class="col-md-2 p-0">
                <div th:replace="fragments/sidebar-admin :: sidebar"></div>
            </div>


            <div class="col-md-10 main-content">

                <div class="card card-custom shadow">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-center mb-4">

                            <h2 class="page-title mb-0">
                                📅 Agendamentos Cadastrados
                            </h2>

                            <a href="/agendamentos/novo" class="btn btn-success shadow-sm">
                                + Novo Agendamento
                            </a>

                        </div>

                        <table class="table table-hover table-bordered align-middle">

                            <thead class="table-success">
                                <tr>
                                    <th>ID</th>
                                    <th>Data</th>
                                    <th>Horário</th>
                                    <th>Status</th>
                                    <th>Usuário</th>
                                    <th width="200">Ações</th>
                                </tr>
                            </thead>

                            <tbody>

                                <tr th:each="agendamento : ${agendamentos}">

                                    <td th:text="${agendamento.id}"></td>

                                    <td th:text="${agendamento.data}"></td>

                                    <td th:text="${agendamento.horario}"></td>

                                    <td th:text="${agendamento.status}"></td>

                                    <td th:text="${agendamento.usuario.nome}"></td>

                                    <td>

                                        <a th:href="@{/agendamentos/editar/{id}(id=${agendamento.id})}"
                                            class="btn btn-warning btn-sm btn-action">
                                            ✏️ Editar
                                        </a>

                                        <a th:href="@{/agendamentos/excluir/{id}(id=${agendamento.id})}"
                                            class="btn btn-danger btn-sm btn-action"
                                            onclick="return confirm('Deseja excluir este agendamento?')">
                                            🗑 Excluir
                                        </a>

                                    </td>

                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
