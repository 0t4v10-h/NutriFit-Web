<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Meta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 p-0">
            <div th:replace="fragments/sidebar-admin :: sidebar"></div>
        </div>


        <div class="col-md-10 main-content">

            <div class="card card-custom shadow">

                <div class="card-body">

                    <h2 class="page-title mb-4">
                        🎯 Cadastrar Meta
                    </h2>

                    <form th:action="@{/metas/salvar}"
                          th:object="${meta}"
                          method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">

                            <label class="form-label">
                                Descrição
                            </label>

                            <input type="text"
                                   class="form-control"
                                   required
                                   th:field="*{descricao}">

                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('descricao')}"
                                 th:errors="*{descricao}">
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Peso Objetivo (kg)
                            </label>

                            <input type="number"
                                   step="0.1"
                                   min="0.1"
                                   class="form-control"
                                   required
                                   th:field="*{pesoObjetivo}">

                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('pesoObjetivo')}"
                                 th:errors="*{pesoObjetivo}">
                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Usuário
                            </label>

                            <select class="form-select"
                                    required
                                    th:field="*{usuario.id}">

                                <option value="">
                                    Selecione um usuário
                                </option>

                                <option th:each="usuario : ${usuarios}"
                                        th:value="${usuario.id}"
                                        th:text="${usuario.nome}">
                                </option>

                            </select>

                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('usuario')}"
                                 th:errors="*{usuario}">
                            </div>

                        </div>

                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-success">
                                💾 Salvar
                            </button>

                            <a href="/metas"
                               class="btn btn-secondary">
                                ↩ Voltar
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
