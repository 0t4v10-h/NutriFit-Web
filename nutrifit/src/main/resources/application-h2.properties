# Perfil alternativo para rodar a aplicacao com banco H2 (em memoria)
# Para usar este perfil:
#   mvn spring-boot:run -Dspring-boot.run.profiles=h2
# ou definindo a variavel de ambiente:
#   SPRING_PROFILES_ACTIVE=h2

spring.datasource.url=jdbc:h2:mem:nutrifit;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Console web do H2 para inspecionar as tabelas durante a apresentacao
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
